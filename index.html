<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ustadz AI — Penyuluh Agama Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --emerald:#0d5c3a;--emerald-mid:#137a4e;
  --gold:#c8963e;--cream:#faf6f0;
  --ink:#1a1208;--ink-soft:#3d3020;
  --border:#d4c4a0;--shadow:rgba(13,92,58,0.12);
  --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tajawal;background:var(--cream);color:var(--ink)}

header{
  position:sticky;top:0;background:var(--emerald);
  padding:12px 16px;color:#fff;border-bottom:3px solid var(--gold)
}
.header-inner{display:flex;align-items:center;gap:10px;max-width:800px;margin:auto}
.container{max-width:800px;margin:auto;padding:20px 16px 140px}

.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 8px 25px var(--shadow)}

.hidden{display:none}

.chat-wrap{display:flex;flex-direction:column;gap:12px}

.msg{display:flex;max-width:90%}
.msg-user{align-self:flex-end}
.msg-ai{align-self:flex-start}

.bubble{
  padding:12px 16px;border-radius:14px;
  background:#fff;border:1px solid var(--border)
}
.msg-user .bubble{background:var(--emerald);color:#fff}

.input-container{
  position:fixed;bottom:0;width:100%;
  background:var(--cream);padding:10px;border-top:1px solid var(--border)
}

.input-inner{display:flex;gap:10px;max-width:800px;margin:auto}

.input-field{
  flex:1;background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:10px;min-height:44px
}

.input-field:empty:before{
  content:attr(data-placeholder);
  color:#999
}

.btn{
  background:var(--emerald);color:#fff;
  border:none;border-radius:10px;padding:10px 14px
}

.arabic{
  font-family:'Noto Naskh Arabic';
  direction:rtl;color:var(--emerald);
  display:block;margin-bottom:8px
}

.section{margin:8px 0;padding:10px;border-left:3px solid var(--emerald);background:#f7f7f7;border-radius:8px}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    🕌 <b>Ustadz AI</b>
  </div>
</header>

<div class="container">

  <div id="setup" class="card">
    <h3>API Key</h3>
    <input id="key" type="password" placeholder="AIza..." style="width:100%;padding:10px;margin-top:10px">
    <button class="btn" onclick="start()">Mulai</button>
  </div>

  <div id="chat" class="hidden">
    <div id="log" class="chat-wrap">
      <div class="msg msg-ai">
        <div class="bubble">
          <span class="arabic">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
          Assalamu'alaikum, saya siap membantu.
        </div>
      </div>
    </div>
  </div>

</div>

<div class="input-container hidden" id="inputBox">
  <div class="input-inner">
    <div id="input" class="input-field" contenteditable="true" data-placeholder="Tulis pertanyaan..."></div>
    <button class="btn" onclick="send()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `
Anda Ustadz AI.
Jawab dengan:
- Dalil Quran
- Hadits
- Mazhab
- Kes
